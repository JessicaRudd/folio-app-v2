name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: folio-app-492702
  REGION: us-central1
  REPO_NAME: folio-repo
  SERVICE_NAME: folio-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          install_components: 'beta'

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Web Image
        run: |
          docker build \
            --build-arg VITE_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
            -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/web:latest .
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/web:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud beta run deploy ${{ env.SERVICE_NAME }} \
            --compose=docker-compose.yaml \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --quiet
