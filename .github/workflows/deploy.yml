name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: folio-app-492702
  REGION: us-central1
  REPO_NAME: folio-repo
  SERVICE_NAME: folio-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          install_components: 'beta'

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Images
        run: |
          # Build and push the web app
          docker build \
            --build-arg VITE_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
            -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/web:latest .
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/web:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud beta run deploy ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --quiet \
            --container web \
              --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/web:latest \
              --port 3000 \
              --set-secrets FIREBASE_API_KEY=FIREBASE_API_KEY:latest,MUSIC_KIT_TOKEN=MUSIC_KIT_TOKEN:latest \
            --container image-proc \
              --image docker.io/imgproxy/imgproxy:latest \
              --set-env-vars IMGPROXY_LISTEN=:8080,IMGPROXY_MAX_SRC_RESOLUTION=50
