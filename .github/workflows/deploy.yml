name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: folio-app-492702
  REGION: us-central1
  REPO_NAME: folio-repo
  SERVICE_NAME: folio-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          install_components: 'beta'

      - name: Deploy Firebase Rules
        run: |
          npm install -g firebase-tools
          # The GCP_SA_KEY provided to google-github-actions/auth is automatically used by firebase-tools
          firebase deploy --only firestore:rules,storage --project ${{ env.PROJECT_ID }} --force

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Images
        run: |
          # Build and push the web app with both the Git SHA (for versioning) and 'latest'
          docker build \
            --build-arg VITE_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
            -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/web:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/web:latest .
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/web:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/web:latest
          
          # Pull from GitHub Container Registry (GHCR) instead of Docker Hub
          # GHCR is more reliable within GitHub Actions and avoids Docker Hub rate limits
          docker pull ghcr.io/imgproxy/imgproxy:latest
          docker tag ghcr.io/imgproxy/imgproxy:latest us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/imgproxy:latest
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/imgproxy:latest

      - name: Deploy to Cloud Run
        run: |
          # Delete the existing service to clear out any zombie containers from previous failed deployments
          # This ensures we start fresh with only the 'web' and 'image-proc' containers
          gcloud run services delete ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --quiet || true

          gcloud beta run deploy ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --quiet \
            --container web \
              --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/web:${{ github.sha }} \
              --port 3000 \
              --set-secrets FIREBASE_API_KEY=FIREBASE_API_KEY:latest,MUSIC_KIT_TOKEN=MUSIC_KIT_TOKEN:latest,GITHUB_FEEDBACK_TOKEN=GITHUB_FEEDBACK_TOKEN:latest \
              --set-env-vars GITHUB_REPO_OWNER=JessRudd,GITHUB_REPO_NAME=folio-app-v2 \
            --container image-proc \
              --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/imgproxy:latest \
              --set-env-vars IMGPROXY_LISTEN=:8080,IMGPROXY_MAX_SRC_RESOLUTION=50
