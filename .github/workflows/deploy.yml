name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGION: us-central1
  REPO_NAME: folio-repo

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Development' }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          install_components: 'beta'

      - name: Deploy Firebase Rules
        run: |
          npm install -g firebase-tools
          firebase deploy --only firestore:rules,storage --project ${{ vars.PROJECT_ID }} --force

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Images
        run: |
          docker build \
            --build-arg FB_V1=${{ secrets.FIREBASE_API_KEY }} \
            --build-arg FB_V2=${{ secrets.FIREBASE_AUTH_DOMAIN }} \
            --build-arg FB_V3=${{ vars.PROJECT_ID }} \
            --build-arg FB_V4=${{ secrets.FIREBASE_STORAGE_BUCKET }} \
            --build-arg FB_V5=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }} \
            --build-arg FB_V6=${{ secrets.FIREBASE_APP_ID }} \
            --build-arg FB_V7=${{ secrets.FIREBASE_MEASUREMENT_ID }} \
            -t us-central1-docker.pkg.dev/${{ vars.PROJECT_ID }}/${{ env.REPO_NAME }}/web:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ vars.PROJECT_ID }}/${{ env.REPO_NAME }}/web:latest .
          
          docker push us-central1-docker.pkg.dev/${{ vars.PROJECT_ID }}/${{ env.REPO_NAME }}/web:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ vars.PROJECT_ID }}/${{ env.REPO_NAME }}/web:latest
          
          docker pull ghcr.io/imgproxy/imgproxy:latest
          docker tag ghcr.io/imgproxy/imgproxy:latest us-central1-docker.pkg.dev/${{ vars.PROJECT_ID }}/${{ env.REPO_NAME }}/imgproxy:latest
          docker push us-central1-docker.pkg.dev/${{ vars.PROJECT_ID }}/${{ env.REPO_NAME }}/imgproxy:latest

      - name: Deploy to Cloud Run
        run: |
          # Use beta deploy for multi-container support
          gcloud beta run deploy ${{ vars.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --quiet \
            --container web \
              --image us-central1-docker.pkg.dev/${{ vars.PROJECT_ID }}/${{ env.REPO_NAME }}/web:${{ github.sha }} \
              --port 3000 \
              --set-secrets "FIREBASE_API_KEY=FIREBASE_API_KEY:latest,MUSIC_KIT_TOKEN=MUSIC_KIT_TOKEN:latest,GITHUB_FEEDBACK_TOKEN=GITHUB_FEEDBACK_TOKEN:latest,RESEND_API_KEY=RESEND_API_KEY:latest" \
              --set-env-vars "GITHUB_REPO_OWNER=${{ vars.GITHUB_REPO_OWNER }},GITHUB_REPO_NAME=${{ vars.GITHUB_REPO_NAME }},RESEND_FROM_EMAIL=${{ vars.RESEND_FROM_EMAIL }},RESEND_BRAND_URL=${{ vars.RESEND_BRAND_URL }},FIREBASE_FIRESTORE_DATABASE_ID=${{ vars.FIREBASE_FIRESTORE_DATABASE_ID }},IS_DEV_DEPLOYMENT=${{ github.ref_name == 'develop' && 'true' || 'false' }}" \
            --container image-proc \
              --image us-central1-docker.pkg.dev/${{ vars.PROJECT_ID }}/${{ env.REPO_NAME }}/imgproxy:latest \
              --set-env-vars IMGPROXY_LISTEN=:8080,IMGPROXY_MAX_SRC_RESOLUTION=50
